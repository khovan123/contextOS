name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate plugin
        run: npm run validate:plugin

      - name: Unit tests
        run: npm test

      - name: Warm local embedding model
        run: node bin/ctx.js embeddings warm -- "kiểm tra flow kiểm duyệt upload"

      - name: MCP protocol and performance smoke
        run: npm run test:mcp
