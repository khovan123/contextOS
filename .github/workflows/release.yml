name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate plugin
        run: npm run validate:plugin

      - name: Unit tests
        run: npm test

      - name: Warm local embedding model
        run: node bin/ctx.js embeddings warm -- "kiểm tra flow kiểm duyệt upload"

      - name: MCP protocol and performance smoke
        run: npm run test:mcp

      - name: Pack check
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
